<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Selección del Taco × Telcel × Mundial 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --bg-subtle: #0a0a0a;
            --text: #FAFAFA;
            --text-secondary: #8E8E93;
            --telcel-blue: #00A0DF;
            --telcel-blue-dim: rgba(0, 160, 223, 0.12);
            --telcel-blue-border: rgba(0, 160, 223, 0.25);
            --telcel-blue-glow: rgba(0, 160, 223, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, 'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body { overscroll-behavior: none; }

        /* — PAGES — */
        .page {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 60px;
            position: relative;
            overflow: hidden;
        }

        .inner {
            width: 100%;
            max-width: 1120px;
        }

        /* — TYPOGRAPHY — */
        .tag {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--telcel-blue);
            font-weight: 600;
            margin-bottom: 28px;
        }

        .hero-title {
            font-size: clamp(2.4rem, 5.5vw, 3.8rem);
            font-weight: 700;
            line-height: 1.12;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
        }

        .hero-title .blue { color: var(--telcel-blue); }

        .lead {
            font-size: 17px;
            color: var(--text-secondary);
            line-height: 1.65;
            max-width: 560px;
            font-weight: 400;
            margin-bottom: 48px;
        }

        /* — PAGE 1: VISION — */
        .bridge-line {
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bridge-line span { color: var(--telcel-blue); }

        .bridge-divider {
            width: 32px;
            height: 1px;
            background: var(--telcel-blue-border);
        }

        .central-phrase {
            font-size: clamp(1.15rem, 2.5vw, 1.55rem);
            font-weight: 500;
            line-height: 1.6;
            color: var(--text);
            max-width: 720px;
            margin-bottom: 48px;
        }

        .central-phrase em {
            font-style: normal;
            color: var(--telcel-blue);
        }

        .metrics-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 0.5px;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .metrics-link:hover {
            color: var(--telcel-blue);
            border-color: var(--telcel-blue-border);
        }

        /* — PAGE 2: FORMAT — */
        .format-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 48px;
        }

        .format-left h2 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .format-left h2 .blue { color: var(--telcel-blue); }

        .format-left p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.65;
            max-width: 440px;
            margin-bottom: 16px;
        }

        .emotional-line {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.55;
            max-width: 440px;
            font-style: italic;
        }

        .emotional-line em {
            font-style: normal;
            color: var(--telcel-blue);
        }

        /* Bracket */
        .bracket-visual {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bracket-title {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--telcel-blue);
            font-weight: 600;
            margin-bottom: 24px;
        }

        .bracket-stages {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .bracket-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .bracket-num {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--text);
        }

        .bracket-num.champion { color: var(--telcel-blue); }

        .bracket-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .bracket-arrow {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.15);
            margin-top: -18px;
        }

        /* Episodes */
        .episodes-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .episode-cell {
            background: var(--bg);
            padding: 20px 16px;
            text-align: center;
        }

        .episode-num {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .episode-num .unit {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .episode-label {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Calendar */
        .calendar-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 32px;
        }

        .calendar-title {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--telcel-blue);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .calendar-timeline {
            display: flex;
            align-items: stretch;
            gap: 0;
        }

        .calendar-phase {
            flex: 1;
            padding: 16px 12px;
            text-align: center;
            border-right: 1px solid var(--border);
        }

        .calendar-phase:last-child { border-right: none; }

        .phase-date {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .phase-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .phase-detail {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .phase-highlight {
            background: var(--telcel-blue-glow);
            border-radius: 8px;
        }

        .phase-highlight .phase-name { color: var(--telcel-blue); }

        /* — PAGE 3: LA PLATAFORMA — */
        .platform-intro {
            font-size: clamp(1.1rem, 2.2vw, 1.35rem);
            font-weight: 400;
            line-height: 1.65;
            color: var(--text-secondary);
            max-width: 640px;
            margin-bottom: 48px;
        }

        .platform-intro em {
            font-style: normal;
            color: var(--text);
            font-weight: 500;
        }

        .platform-intro strong {
            color: var(--telcel-blue);
            font-weight: 600;
        }

        /* Evolution timeline */
        .evolution-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--telcel-blue-border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 48px;
        }

        .evo-cell {
            background: var(--bg);
            padding: 28px 24px;
            text-align: center;
        }

        .evo-label {
            font-size: 10px;
            color: var(--telcel-blue);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .evo-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .evo-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Benefits compact */
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }

        .benefit-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 24px;
        }

        .benefit-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .benefit-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        /* Close */
        .close-statement {
            font-size: clamp(1.3rem, 3vw, 2rem);
            font-weight: 600;
            line-height: 1.45;
            max-width: 680px;
            margin-bottom: 40px;
        }

        .close-statement .blue { color: var(--telcel-blue); }

        .brand-bar {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Team collapsible */
        .team-toggle {
            position: fixed;
            bottom: 28px;
            left: 28px;
            z-index: 100;
        }

        .team-btn {
            background: rgba(255, 255, 255, 0.06);
